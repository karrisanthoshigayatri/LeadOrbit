<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/theme-boot.js"></script>
    <title>Page Not Found - LeadOrbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link href="/theme.css" rel="stylesheet">
    <style>
        .error-card {
            max-width: 460px;
            width: 100%;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--brand-gradient-start), var(--brand-gradient-end));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
            font-family: 'Sora', sans-serif;
        }

        /* Centered Orbit animation fitting the 'LeadOrbit' branding */
        .orbit-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .planet {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-gradient-start), var(--brand-gradient-end));
            box-shadow: 0 0 25px rgba(45, 212, 191, 0.4);
            animation: pulse 3s ease-in-out infinite;
            z-index: 2;
        }

        .planet-ring {
            position: absolute;
            width: 105px;
            height: 28px;
            border: 3px solid rgba(45, 212, 191, 0.35);
            border-radius: 50%;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 3;
            /* Tilted perspective: clips to simulate wrapping front part */
            clip-path: polygon(0% 0%, 100% 0%, 100% 60%, 0% 60%);
        }

        .planet-ring-back {
            position: absolute;
            width: 105px;
            height: 28px;
            border: 3px solid rgba(45, 212, 191, 0.15);
            border-radius: 50%;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 1;
            /* Tilted perspective: clips to simulate wrapping back part */
            clip-path: polygon(0% 40%, 100% 40%, 100% 100%, 0% 100%);
        }

        .satellite-orbit {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px dashed rgba(148, 163, 184, 0.2);
            animation: spin 8s linear infinite;
            z-index: 4;
        }

        .satellite {
            position: absolute;
            top: -6px;
            left: 50%;
            margin-left: -6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-hover);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 25px rgba(45, 212, 191, 0.45);
            }

            50% {
                transform: scale(1.06);
                box-shadow: 0 0 35px rgba(45, 212, 191, 0.65);
            }
        }

        /* Subtle vertical floating animation for the entire card */
        .floating-card {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }
    </style>
</head>

<body class="auth-page d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="container d-flex justify-content-center">
        <div class="card auth-card border-0 shadow-sm p-4 p-sm-5 text-center error-card floating-card">
            <div class="card-body p-0">
                <!-- LeadOrbit Brand logo/text -->
                <div class="mb-4">
                    <div class="brand d-inline-block">LeadOrbit</div>
                </div>

                <!-- Custom Space Orbit Animation -->
                <div class="orbit-container">
                    <div class="planet-ring-back"></div>
                    <div class="planet"></div>
                    <div class="planet-ring"></div>
                    <div class="satellite-orbit">
                        <div class="satellite"></div>
                    </div>
                </div>

                <!-- Message details -->
                <h1 class="error-code">404</h1>
                <h2 class="h4 fw-bold mb-3 text-body">Page Not Found</h2>
                <p class="text-muted mb-4 px-md-3">
                    Oops! The page you are looking for has drifted out of orbit. It might have been moved or doesn't
                    exist.
                </p>

                <!-- Navigation button -->
                <div class="d-grid">
                    <a href="/dashboard.html"
                        class="btn btn-primary btn-lg fs-6 py-2.5 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-arrow-left"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
